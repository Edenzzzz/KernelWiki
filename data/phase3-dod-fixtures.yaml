## Phase 3 Definition-of-Done fixtures
## Consumed by scripts/check_dod_fixtures.py
##
## These five fixtures encode the AC-7 immutable contract from the goal
## tracker: NVFP4 GEMV, warp specialization, DeepGEMM Nc=128 CUDA-core
## promotion, CUTLASS PersistentScheduler+CLC via PR-2161, and FA4 software
## exp. Each fixture passes when every `required_assets` glob independently
## matches at least one file, those matches reach `required_min_lines`,
## every glob has at least one file in the allowed `required_provenance_modes`,
## and every `required_content_patterns` regex matches across the combined set.

fixtures:
  - question: "How do I write an NVFP4 batched GEMV on B200?"
    required_assets:
      - "artifacts/kernels/nvfp4-gemv/full/nvfp4_scaled_mm_kernels.cu"
      - "artifacts/kernels/nvfp4-gemv/variants/*-ptx-assembly-*.ptx"
    required_min_lines: 8
    required_provenance_modes: [verbatim, derived]
    required_content_patterns:
      - "nvfp4|fp4|e2m1"

  - question: "How is warp specialization structured on Blackwell (producer / consumer / epilogue)?"
    required_assets:
      - "artifacts/kernels/warp-specialization/full/sm100_fmha_fwd_mainloop_tma_warpspecialized.hpp"
      - "artifacts/kernels/warp-specialization/variants/01-producer-consumer-skeleton.cu"
    required_min_lines: 40
    required_provenance_modes: [verbatim, derived]
    required_content_patterns:
      - "pipeline|mbarrier|producer|consumer"

  - question: "How does DeepGEMM do Nc=128 CUDA-core promotion for FP8 accumulation?"
    required_assets:
      - "artifacts/kernels/deepgemm/variants/01-nc128-cuda-core-promotion.cpp"
      - "artifacts/kernels/deepgemm/full/sglang-PR-21239-deepgemm-integration.patch"
    required_min_lines: 30
    required_provenance_modes: [derived, verbatim, upstream-patch]
    required_content_patterns:
      - "Nc *= *128|cuda.?core|promotion"

  - question: "How does CUTLASS configure PersistentScheduler + CLC (Cluster Launch Control) on SM100?"
    required_assets:
      - "artifacts/prs/cutlass/PR-2161/diff.patch"
      - "artifacts/prs/cutlass/PR-2161/key-files/**/*"
    required_min_lines: 40
    required_provenance_modes: [verbatim, upstream-patch]
    required_content_patterns:
      - "grid_dependency_control|GDC|griddepcontrol"

  - question: "How does FlashAttention-4 implement software-emulated exponential and softmax rescaling?"
    required_assets:
      - "artifacts/kernels/flash-attention-4/full/sm100_fmha_bwd_mla_kernel_tma_warpspecialized.hpp"
      - "artifacts/kernels/flash-attention-4/variants/01-software-exp-skeleton.cu"
    required_min_lines: 20
    required_provenance_modes: [verbatim, derived]
    required_content_patterns:
      - "exp2?|rescale|softmax"
