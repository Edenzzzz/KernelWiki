## Contest submission sources manifest
## Consumed by scripts/collect_contest_code.py
##
## Structure:
##   <contest-slug>:
##     <problem-slug>:
##       <rank-N-participant-slug>:
##         kind: github-file | inline-from-blog | discord-only | unavailable-public
##         origin_url: <URL the user should visit for context>
##         upstream_repo: owner/name           # for kind=github-file
##         upstream_sha: <40-char SHA>          # for kind=github-file
##         files:                                # for kind=github-file or inline-from-blog
##           - upstream_path: path/in/upstream.cu
##             local_name: (optional; defaults to basename)
##         blog_slug: <slug>                     # for kind=inline-from-blog
##         official: true|false                  # for kind=github-file (true => official-submission)
##         license: <SPDX or inherits-...>        # optional, for verbatim
##         reason: <string>                      # for kind=discord-only / unavailable-public
##
## The <rank-N-participant-slug> is computed as:
##   rank-<rank>-<lowercased participant with non-alphanumeric → hyphen>
## E.g., rank 1 "Simon (veitner)" → rank-1-simon-veitner

gpu-mode-nvfp4:
